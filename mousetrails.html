<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mouse Trails</title>
    <link rel="icon" type="image/x-icon" href="icon.ico" />
</head>
<style>
    #gamecanvas {
      border: #fff 10px solid;
      border-radius: 10px;
      width: calc(100vw - 20px);
      height: calc(100vh - 20px);
      background-color: #010303;
      margin-left: 0px;
      margin-top: 0px;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 1;
      display: block;
      pointer-events: auto;
      cursor: pointer;
    }
    .text {
        position: fixed;
        display: block;
        font-size: 20px;
        color: #fff;
        z-index: 5;
        text-align: center;
    }
    #error {
        display: none;
        margin-top: 50px;
        color: #f00;
    }
    #recover {
        color: #cff;
        margin-top: 2px;
        margin-left: 6px;
        display: none;
    }
</style>
<body>
    <canvas id="gamecanvas"></canvas>
    <p id="alert" class="text">Click to start</p>
    <p id="error" class="text">Please Wait!</p>
    <p id="recover" class="text">Object Offscreen, press r to recover</p>
</div>
</body>
<script>
    console.clear()


    const canvas = document.getElementById("gamecanvas");
    const ctx = canvas.getContext("2d");
    const alert = document.getElementById("alert");
    const error = document.getElementById("error");
    const recover = document.getElementById("recover");
    let mouseX = null;
    let mouseY = null;
    let prevMouseX = 0;
    let prevMouseY = 0;
    let mouseLocked = true; 
    let xpos = 0;
    let ypos = 0;
    let mouseXv = 0;
    let mouseYv = 0;
    let posHist = [];
    const maxlength = 75;
    const trailwidth = 40;
    let mouseDown = false;
    let mouseMoved = false;
    let pointerLocked = false;
    let keysPressed = [];
    let offscreentimer = 0;
    let mode = 1;
    let t=0;


    function draw() {
        t+=1/60
        

        if (pointerLocked) {
            alert.style.display = "none";
            canvas.style.cursor = "none";

            if (xpos < 0-trailwidth || xpos > canvas.width+trailwidth || ypos < 0-trailwidth || ypos > canvas.height+trailwidth) {
                if (offscreentimer>= 50) {
                   recover.style.display = "block"
                }
                offscreentimer++;
            } else {
                recover.style.display = "none"
                offscreentimer=0;
            }

        } else {

            mouseXv = 0;
            mouseYv = 0;

            alert.style.display = "block";
            alert.style.left = `calc(100vw - ${canvas.width/2+80}px)`;
            canvas.style.cursor = "pointer";


            if (!window._hasCustomPointerLockErrorHandler) {
                window._hasCustomPointerLockErrorHandler = true;
                window.pointerLockSecurityError = false;

                document.addEventListener('pointerlockerror', () => {
                    window.pointerLockSecurityError = true;
                    console.log('pointerlockerror event received');
                    error.style.display = "block";
                });

                document.addEventListener('pointerlockchange', () => {
                    if (document.pointerLockElement === null && pointerLocked) {
                    }
                });
            }

            error.style.left =  `calc(100vw - ${canvas.width/2+77}px)`;

        }

        if (mouseXv > 0) {
            mouseXv = Math.min(mouseXv, 50);
        } else {
            mouseXv = Math.max(mouseXv, -50);
        }

        mouseMoved = false;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fff"
        ctx.fillRect(0,canvas.height - 50,80,50);
        ctx.fillStyle = "#000"
        ctx.fillRect(2,canvas.height - 48,76,46);

        ctx.fillStyle = `hsl(${(t*10)%360},50%,70%)`
        ctx.fillRect(80,canvas.height - 50,80,50);
        ctx.fillStyle = "#000"
        ctx.fillRect(82,canvas.height - 48,76,46);

        ctx.fillStyle = `hsl(${(t*10)%360},50%,70%)`
        ctx.fillRect(160,canvas.height - 50,80,50);
        ctx.fillStyle = `hsl(${(t*10)%360},50%,10%)`
        ctx.fillRect(162,canvas.height - 48,76,46);


        if (ypos <=  canvas.height && ypos >= canvas.height-48) {
           if (xpos <= 76) {
              mode = 1;
        }  else if (xpos <= 82+76) {
             mode = 2;
        } else if (xpos <= 162+76){
            mode = 3;
        }
    }

        let color = 0;

        for (let i = 0; i < posHist.length - 1; i++) {
            const p0 = posHist[i];
            const p1 = posHist[i + 1];

            // const dx = p1.x - p0.x;
            // const dy = p1.y - p0.y;
            // const distance = Math.sqrt(dx * dx + dy * dy);

            ctx.beginPath();

            if (mode == 2 || mode == 3) {
                ctx.strokeStyle = `hsl(${((color)+t*50)%360},50%,70%)`;
            } else if (mode == 1) {
                ctx.strokeStyle = "#fff";
            } else {
                ctx.strokeStyle = "#fff";
            }

            ctx.lineWidth = Math.min(1 + (i * trailwidth / maxlength), maxlength / 2);
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.lineCap = "round";
            ctx.stroke();

            color+=6;
        }
   
        color = 0;

        for (let i = 0; i < posHist.length - 1; i++) {
            const p0 = posHist[i];
            const p1 = posHist[i + 1];
            ctx.beginPath();
            if (mode == 3) {
                ctx.strokeStyle = `hsl(${((color)+t*50)%360},50%,10%)`;
            } else {
                ctx.strokeStyle = "#000";
            }

            ctx.lineWidth = Math.min(1 + (i * (trailwidth / 1.2) / maxlength), maxlength / 2);
            ctx.moveTo(p0.x, p0.y);
            ctx.lineTo(p1.x, p1.y);
            ctx.lineCap = "round";
            ctx.stroke();

            color +=6
        }
        if (pointerLocked) {
           posHist.push({ x: xpos, y: ypos });
             if (posHist.length > maxlength) {
              posHist = posHist.slice(0 - maxlength);
           }
          }



        requestAnimationFrame(draw);
    }

    draw();

    function setMode(num) {
        mode = num;
    }


    function resizeCanvas() {
        canvas.width = window.innerWidth - 25;
        canvas.height = window.innerHeight - 25;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let first = true;
    canvas.addEventListener("mousemove", function(event) {
        if (first) {
            for (let i = 0; i < maxlength; i++) {
                xpos = canvas.width/2; ypos = canvas.height/2;
                posHist.push({ x: xpos, y: ypos});
            }
        }

        first = false;
    })

    function handlePointerLockChange() {
        pointerLocked = (document.pointerLockElement === canvas);

        if (pointerLocked) {
            mouseXv = 0; mouseYv = 0;
            error.style.display = "none";
        } else {
            mouseX = null;
            mouseY = null;
        }
    }
    document.addEventListener('pointerlockchange', handlePointerLockChange);

    canvas.addEventListener("pointermove", function(event) {
        if (!pointerLocked) return;
        mouseXv = event.movementX;
        mouseYv = event.movementY;
        xpos += mouseXv;
        ypos += mouseYv;
        mouseMoved = true;
    });

    window.addEventListener("mousedown", function(event) {
        mouseDown = true;
        if (!pointerLocked && document.pointerLockElement !== canvas) {
            canvas.requestPointerLock();
        }
    });

    window.addEventListener("mouseup", function(event) {
        mouseDown = false;
    });

    window.addEventListener("blur", function() {
        if (document.pointerLockElement === canvas) {
            document.exitPointerLock();
        }
    });

    window.addEventListener('keydown', function(e) {
      keysPressed[e.key] = true;
      if (e.key = "r") {
        xpos = canvas.width/2;
        ypos = canvas.height/2
      }
    });

    window.addEventListener('keyup', function(e) {
      keysPressed[e.key] = false;
    });


</script>
</html>
