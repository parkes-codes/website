    <script>
        let t = 0;
        const pi = Math.pi;
        let x=10;
        let xdir=1;
        let y=68;
        let ydir=1;
        let hue=0;
        const bounceSound = new Audio("click.wav");
        const pfp = document.getElementById("profilepicture");
        const funbutton = document.getElementById("funbutton");
        const golbutton = document.getElementById("golbtn");
        const ag2text = document.getElementById("ag2text")
        let funclicked = false;


        function movestuff() {
          funclicked = true;
            const texts = document.getElementsByClassName("text");
            const scale = (Math.sin(t) + 5) *0.2;
            for (let i = 0; i < texts.length; i++) {
                texts[i].style.color = `hsl(${t*100 % 360}, 50%, 70%)`;
                texts[i].style.transform = `rotate(${Math.sin(t+i)*10}deg)`;
            }

            x+=xdir*3;
            y+=ydir*3;
            pfp.style.left = `${x}px`;
            pfp.style.top = `${y}px`;
            bounce();
            
            requestAnimationFrame(movestuff);
        }
        
        function tick() {
            t+= 0.1; 
            funbutton.style.borderColor = `hsl(${(t*50)%360},50%,80%)`
            golbutton.style.color =   `hsl(0,0%,${(Math.sin(t))*10+85}%)`
            ag2text.style.color = `hsl(200,50%,${(Math.sin(t))*8+85}%)`



            requestAnimationFrame(tick);
        }

        function bounce() {
            const scrollX = window.scrollX || window.pageXOffset || document.documentElement.scrollLeft || 0;
            const scrollY = window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0;

            const maxX = document.documentElement.clientWidth + scrollX - 100;
            const maxY = document.documentElement.clientHeight + scrollY - 100;

            if (x >= maxX) {
                xdir = -1;
                hue += 20;
                bounceSound.play();
                pfp.style.filter = `hue-rotate(${hue}deg)`;
                x = maxX; 
            }
            if (x <= scrollX) {
                xdir = 1;
                hue += 20;
                bounceSound.play();
                pfp.style.filter = `hue-rotate(${hue}deg)`;
                x = scrollX;
            }
            if (y >= maxY) {
                ydir = -1;
                hue += 20;
                bounceSound.play();
                pfp.style.filter = `hue-rotate(${hue}deg)`;
                y = maxY;
            }
            if (y <= scrollY) {
                ydir = 1;
                hue += 20;
                bounceSound.play();
                pfp.style.filter = `hue-rotate(${hue}deg)`;
                y = scrollY; 
            }

        }

        tick();
    </script>
