    <script>
      let t = 0;
      const pi = Math.PI;
      let x = 10;
      let xdir = 1;
      let y = 68;
      let ydir = 1;
      let hue = 0;
      const bounceSound = new Audio("click.wav");
      const pfp = document.getElementById("profilepicture");
      const funbutton = document.getElementById("funbutton");
      const golbutton = document.getElementById("golbtn");
      const ag2text = document.getElementById("ag2text")
      const thingy = document.getElementById("thingy");
      let funclicked = false;

      // --- Random rotation on hover for .button ---
      // Store a map from button to its original transform
      const buttonOriginalTransformMap = new WeakMap();

      function getBaseTransform(el) {
        // Remove the rotate(...) part, keep rest of transform
        const style = window.getComputedStyle(el);
        let tf = style.transform;
        if (el.hasAttribute('data-base-transform')) {
          return el.getAttribute('data-base-transform') || "";
        } else {
          // Don't store actual random hover rotate here!
          el.setAttribute('data-base-transform', tf === "none" ? "" : tf);
          return tf === "none" ? "" : tf;
        }
      }

      function randomRotate() {
        return Math.random() * 10 - 5; // -5 to 5 degrees
      }

      // After DOM loaded, add listeners to all .button elements
      document.addEventListener('DOMContentLoaded', function() {
        const buttons = document.querySelectorAll('.button');
        buttons.forEach(function(btn) {
          btn.addEventListener('mouseenter', function() {
            // Store base transform only on first hover
            let base = getBaseTransform(btn);

            // Generate random deg between -5 to 5
            const deg = randomRotate();
            // Set transform with rotation!
            btn.style.transform = (base ? base + " " : "") + `rotate(${deg}deg) scale(1.05)`;
            btn.style.transition = "transform 0.28s cubic-bezier(0.23,1.3,0.32,1)";
          });
          btn.addEventListener('mouseleave', function() {
            // Restore previous/original transform
            let base = btn.getAttribute('data-base-transform') || "";
            btn.style.transform = base;
          });
          // For keyboard focus (accessibility)
          btn.addEventListener('focus', function() {
            const deg = randomRotate();
            let base = getBaseTransform(btn);
            btn.style.transform = (base ? base + " " : "") + `rotate(${deg}deg) scale(1.05)`;
            btn.style.transition = "transform 0.28s cubic-bezier(0.23,1.3,0.32,1)";
          });
          btn.addEventListener('blur', function() {
            // Restore previous/original transform
            let base = btn.getAttribute('data-base-transform') || "";
            btn.style.transform = base;
          });
        });
      });

      function movestuff() {
        if (!funclicked) {
          thingy.style.marginTop = `${pfp.height+20}px`
     
        }
        funclicked = true;
        // Only rotate, do not move elements up/down!
        const texts = document.getElementsByClassName("text");
        for (let i = 0; i < texts.length; i++) {
          texts[i].style.color = `hsl(${t * 100 % 360}, 50%, 70%)`;
          // Only rotate in-place. Remove any explicit translation.
          texts[i].style.transform = `rotate(${Math.sin(t + i) * 10}deg)`;
        }

        // Move only the profile picture -- do not move texts/buttons
        x += xdir * 3;
        y += ydir * 3;
        bounce();

        pfp.style.position = window.innerWidth > 700 ? "absolute" : "fixed";
        pfp.style.left = `${x}px`;
        pfp.style.top = `${y}px`;

        requestAnimationFrame(movestuff);
      }

      function tick() {
        t += 0.1;
        funbutton.style.borderColor = `hsl(${(t * 50) % 360},50%,80%)`;
        golbutton.style.color = `hsl(0,0%,${(Math.sin(t)) * 10 + 85}%)`;
        ag2text.style.color = `hsl(200,50%,${(Math.sin(t)) * 8 + 85}%)`;
        requestAnimationFrame(tick);
      }

      function bounce() {
        const scrollX = window.scrollX || window.pageXOffset || document.documentElement.scrollLeft || 0;
        const scrollY = window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0;

        // Responsive picture bounding box
        const imgWidth = pfp.offsetWidth || 100;
        const imgHeight = pfp.offsetHeight || 100;
        const maxX = (window.innerWidth || document.documentElement.clientWidth) + scrollX - imgWidth;
        const maxY = (window.innerHeight || document.documentElement.clientHeight) + scrollY - imgHeight - 10;

        if (x >= maxX) {
          xdir = -1;
          hue += 20;
          bounceSound.play();
          pfp.style.filter = `hue-rotate(${hue}deg)`;
          x = maxX;
        }
        if (x <= scrollX) {
          xdir = 1;
          hue += 20;
          bounceSound.play();
          pfp.style.filter = `hue-rotate(${hue}deg)`;
          x = scrollX;
        }
        if (y >= maxY) {
          ydir = -1;
          hue += 20;
          bounceSound.play();
          pfp.style.filter = `hue-rotate(${hue}deg)`;
          y = maxY;
        }
        if (y <= scrollY) {
          ydir = 1;
          hue += 20;
          bounceSound.play();
          pfp.style.filter = `hue-rotate(${hue}deg)`;
          y = scrollY;
        }
      }

      tick();
    </script>
