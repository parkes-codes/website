    <script>

      const bounceSound = new Audio("click.wav");

      const profileLinks = Array.from(document.querySelectorAll('.profilepic-link')).map(el => {
        const rect = el.getBoundingClientRect();
        let dx = 3;
        let dy = 3;
        const w = el.offsetWidth || rect.width || 100;
        const h = el.offsetHeight || rect.height || 100;


        let sx = el.offsetLeft || rect.left;
        let sy = el.offsetTop || rect.top;


        el.style.zIndex = 14;
        el.style.pointerEvents = "auto";

        return {
          el: el,
          x: sx,
          y: sy,
          dx: dx,
          dy: dy,
          hue: 0 
        };
      });

      let dvdAnimating = false;

      function updateProfileLinksDVD() {
        const scrollX = window.scrollX || window.pageXOffset || document.documentElement.scrollLeft || 0;
        const scrollY = window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0;
        profileLinks.forEach(obj => {
          let {el, x, y, dx, dy} = obj;
          const w = el.offsetWidth || 100;
          const h = el.offsetHeight || 100;
          const maxX = (window.innerWidth || document.documentElement.clientWidth) + scrollX - w;
          const maxY = (window.innerHeight || document.documentElement.clientHeight) + scrollY - h - 10;
          let bounced = false;

          // Move step
          x += dx;
          y += dy;

          // X bounce
          if (x >= maxX) {
            dx = -Math.abs(dx);
            obj.hue += 37;
            bounced = true;
            x = maxX;
          }
          if (x <= scrollX) {
            dx = Math.abs(dx);
            obj.hue += 47;
            bounced = true;
            x = scrollX;
          }
          // Y bounce
          if (y >= maxY) {
            dy = -Math.abs(dy);
            obj.hue += 59;
            bounced = true;
            y = maxY;
          }
          if (y <= scrollY) {
            dy = Math.abs(dy);
            obj.hue += 41;
            bounced = true;
            y = scrollY;
          }

          // Set new state
          obj.x = x;
          obj.y = y;
          obj.dx = dx;
          obj.dy = dy;

          // Animate element (now safe to force position/left/top/margin)
          el.style.position = window.innerWidth > 700 ? "absolute" : "fixed";
          el.style.left = `${x}px`;
          el.style.top = `${y}px`;
          el.style.margin = "0"; 

          if (bounced) {
            try {
              bounceSound.currentTime = 0;
              bounceSound.play();
            } catch (e) {}
            el.style.filter = `hue-rotate(${obj.hue}deg)`;
          }
        });
        if (dvdAnimating) {
          requestAnimationFrame(updateProfileLinksDVD);
        }
      }
      let t = 0;
      const pi = Math.PI;
      const funbutton = document.getElementById("funbutton");
      const golbutton = document.getElementById("golbtn");
      const ag2text = document.getElementById("ag2text");
      const thingy = document.getElementById("thingy");
      const bgOverlay = document.getElementById("backgroundOverlay");
      const velkomm = document.getElementById("velkomm");
      let funclicked = false;

      // --- Random rotation on hover for .button ---
      const buttonOriginalTransformMap = new WeakMap();

      function getBaseTransform(el) {
        const style = window.getComputedStyle(el);
        let tf = style.transform;
        if (el.hasAttribute('data-base-transform')) {
          return el.getAttribute('data-base-transform') || "";
        } else {
          el.setAttribute('data-base-transform', tf === "none" ? "" : tf);
          return tf === "none" ? "" : tf;
        }
      }

      function randomRotate() {
        return Math.random() * 10 - 5; // -5 to 5 degrees
      }

      // Button listeners after DOMContentLoaded
      document.addEventListener('DOMContentLoaded', function() {
        const buttons = document.querySelectorAll('.button');
        buttons.forEach(function(btn) {
          btn.addEventListener('mouseenter', function() {
            let base = getBaseTransform(btn);
            const deg = randomRotate();
            btn.style.transform = (base ? base + " " : "") + `rotate(${deg}deg) scale(1.05)`;
            btn.style.transition = "transform 0.28s cubic-bezier(0.23,1.3,0.32,1)";
          });
          btn.addEventListener('mouseleave', function() {
            let base = btn.getAttribute('data-base-transform') || "";
            btn.style.transform = base;
          });
          btn.addEventListener('focus', function() {
            const deg = randomRotate();
            let base = getBaseTransform(btn);
            btn.style.transform = (base ? base + " " : "") + `rotate(${deg}deg) scale(1.05)`;
            btn.style.transition = "transform 0.28s cubic-bezier(0.23,1.3,0.32,1)";
          });
          btn.addEventListener('blur', function() {
            let base = btn.getAttribute('data-base-transform') || "";
            btn.style.transform = base;
          });
        });

        // Do NOT mess with profilepic-link margin on page load!
      });

      function randomDxDy() {
        // Generate random dx, dy between -5 and 5, but not too small
        let dx = 0, dy = 0;
        while (Math.abs(dx) < 1.5) {
          dx = Math.random() * 10 - 5;
        }
        while (Math.abs(dy) < 1.5) {
          dy = Math.random() * 10 - 5;
        }
        return { dx, dy };
      }

      function movestuff() {
        if (!funclicked) {
          profileLinks.forEach(obj => {
            const {dx, dy} = randomDxDy();
            obj.dx = dx;
            obj.dy = dy;
          });
          // Start animating the DVD images on first click
          if (profileLinks.length > 0 && !dvdAnimating) {
            // Set initial position and margin for all .profilepic-link images now, not before
            profileLinks.forEach(obj => {
              const el = obj.el;
              el.style.position = window.innerWidth > 700 ? 'absolute' : 'fixed';
              el.style.left = `${obj.x}px`;
              el.style.top = `${obj.y}px`;
              el.style.margin = "0"; // Only now!
              el.style.zIndex = 14;
            });
            dvdAnimating = true;
            requestAnimationFrame(updateProfileLinksDVD);
          }
        } 
        funclicked = true;
        const texts = document.getElementsByClassName("text");
        for (let i = 0; i < texts.length; i++) {
          texts[i].style.color = `hsl(${t * 100 % 360}, 50%, 70%)`;
          texts[i].style.transform = `rotate(${Math.sin(t + i) * 10}deg) scale(${Math.sin(t*2+i)*0.1+1})`;
        }

        bgOverlay.style.backgroundColor = `hsla(${(t*30)%360},50%,50%,0.3)`

        requestAnimationFrame(movestuff);
      }

      function tick() {
        t += 0.1;
        if (funbutton)
          funbutton.style.borderColor = `hsl(${(t * 50) % 360},50%,80%)`;
        if (golbutton)
          golbutton.style.color = `hsl(0,0%,${(Math.sin(t)) * 10 + 85}%)`;
        if (ag2text)
          ag2text.style.color = `hsl(200,50%,${(Math.sin(t)) * 8 + 85}%)`;
        requestAnimationFrame(tick);
      }

      tick();
 
    </script>
