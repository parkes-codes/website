<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Water Sort</title>
    <link rel="icon" type="image/x-icon" href="icon.ico" />
</head>
<style>
    body {
        background-color: #000;
    }
    #gamecanvas {
        border: #fff 5px solid;
        border-radius: 10px;
        width: calc(100vw - 11px);
        height: calc(100vh - 11px);
        margin-left: -8px;
        margin-top: -8px;
        position: relative;
        z-index: 1;
        display: block;
        background: none;
    }
</style>
<body>

 <canvas id="gamecanvas"></canvas>

</body>
<script>
const canvas = document.getElementById("gamecanvas");
const ctx = canvas.getContext('2d');
let keysPressed = [];
let colorSet = ["#f00", "#0f0", "#00f", "#0ff"];
let mouseX = 0;
let mouseY = 0;
let mousedown = false;
let cupStates = [];
let difficulty = prompt("difficulty")
let cupAnimationStates = [];
const ANIMATION_DIST = 30;  // px to move up or down
const ANIMATION_FRAMES = 10;
let selectedCupIndex = null;

// Store layout info to support responsive positioning on resize/game reset
let rows = 4;
let cols = 7;
// Cup spacing parameters (change these for different layouts)
const CUP_X_SPACING = 100;
const CUP_Y_SPACING = 130;
const CUP_X_MARGIN = 50;
const CUP_Y_MARGIN = 70;

// Get cup position so it's always centered after canvas resize/restart
function getCupPosition(i, j) {
    let gridWidth = (cols - 1) * CUP_X_SPACING;
    let gridHeight = (rows - 1) * CUP_Y_SPACING;
    let x = i * CUP_X_SPACING - gridWidth / 2;
    let y = j * CUP_Y_SPACING - gridHeight / 2 - CUP_Y_MARGIN+120;
    return { x, y };
}

// Game initialization logic as a function for resets
function initializeGame() {
    cupStates = [];
    // Position cups so they're always centered anywhere
    for (let j = 0; j < rows; j++) {
        for (let i = 0; i < cols; i++) {
            cupStates.push({
                cont: [
                    Math.floor(Math.random() * 4) + 1,
                    Math.floor(Math.random() * 4) + 1,
                    Math.floor(Math.random() * 4) + 1,
                    Math.floor(Math.random() * 4) + 1
                ],
                pos: getCupPosition(i, j)
            });
        }
    }

    let k = 0;
    while (k < 6 - difficulty) {
        let index = Math.floor(Math.random() * cupStates.length);
        cupStates[index].cont = [];
        k++;
    }

    // Animation state per cup
    cupAnimationStates = cupStates.map(() => ({
        direction: 0, // 1 = anim up, -1 = anim down, 0 = stopped
        progress: 0,  // 0 (down) to ANIMATION_FRAMES (up)
        target: 0,    // 0 (down) or ANIMATION_FRAMES (up)
        selected: false
    }));

    selectedCupIndex = null;
}

function repositionCups() {
    // Recalculate all cup positions on resize/reset
    for (let idx = 0; idx < cupStates.length; idx++) {
        let row = Math.floor(idx / cols);
        let col = idx % cols;
        cupStates[idx].pos = getCupPosition(col, row);
    }
}

// Helper function to check if coords inside a cup
function isPointInCup(x, y, cupX, cupY, size = 1.3) {
    let rx = cupX * size + canvas.width / 2 - 23 * size;
    let ry = cupY * size + canvas.height / 2 - 90 * size;
    let width = 60 * size;
    let height = 100 * size;
    return x >= rx && x <= rx + width && y >= ry && y <= ry + height;
}

// Helper function to determine if cup is full and all same color
function isCupFullAndUniform(cup, maxCupSize = 4) {
    if (!cup.cont || cup.cont.length !== maxCupSize) return false;
    let first = cup.cont[0];
    for (let i = 1; i < cup.cont.length; i++) {
        if (cup.cont[i] !== first) return false;
    }
    return true;
}

// WIN DETECTION: Check if the game has been won
function isGameWon() {
    for (let i = 0; i < cupStates.length; i++) {
        let cont = cupStates[i].cont;
        // Cup is considered valid if empty, or all elements are same (but not mixed)
        if (cont.length === 0) continue;
        let first = cont[0];
        for (let j = 1; j < cont.length; j++) {
            if (cont[j] !== first) {
                return false;
            }
        }
    }
    return true;
}

// Helper function: checks if there are any available moves left
function hasAvailableMoves() {
    const maxCupSize = 4;
    for (let i = 0; i < cupStates.length; i++) {
        let fromCup = cupStates[i];
        if (!fromCup.cont || fromCup.cont.length === 0) continue;
        let color = fromCup.cont[fromCup.cont.length - 1];
        for (let j = 0; j < cupStates.length; j++) {
            if (i === j) continue;
            let toCup = cupStates[j];
            if (!toCup.cont) continue;
            if (toCup.cont.length >= maxCupSize) continue;

            // do not allow pour into a full and uniform cup
            if (isCupFullAndUniform(toCup)) continue;

            // Pour can occur if toCup is empty or top color matches
            if (
                toCup.cont.length === 0 ||
                toCup.cont[toCup.cont.length - 1] === color
            ) {
                if (fromCup.cont.length > 0) {
                    // Must be at least one to pour
                    return true;
                }
            }
        }
    }
    return false;
}

function drawCup(contents, x, y, size, index, animOffset = 0) {
    let cupWidth = 50 * size;
    let cupHeight = 100 * size;
    let liquidHeight = 20 * size;
    let liquidOffset = 98 * size;
    let x2 = x - (25 * size);
    let y2 = y - (100 * size) + animOffset; // animate up or down

    for (let i = 0; i < contents.length; i++) {
        let c = contents[i] - 1;
        colorSet = ["#f00", "#0f0", "#00f", "#0ff"];
        if (
            (typeof c === "number" && Number.isInteger(c)) &&
            c >= 0 && c < colorSet.length
        ) {
            ctx.fillStyle = colorSet[c];
            ctx.fillRect(
                x2 + canvas.width / 2,
                y2 + canvas.height / 2 + liquidOffset - (i + 1) * liquidHeight,
                cupWidth,
                liquidHeight
            );
        }
    }

    let color = "#fff";
    if (isCupFullAndUniform(cupStates[index])) {
        ctx.save();
        ctx.globalAlpha = 1;
        color = "#333";
        ctx.fillStyle = color;
        ctx.fillRect(
            x2 + canvas.width / 2,
            y2 + canvas.height / 2,
            cupWidth,
            5
        );
        ctx.restore();
    }

    ctx.beginPath();
    ctx.moveTo(x2 + canvas.width / 2, y2 + canvas.height / 2);
    ctx.lineTo(x2 + canvas.width / 2, y2 + cupHeight + canvas.height / 2);
    ctx.lineWidth = 5 * size;
    ctx.strokeStyle = `${color}`;
    ctx.lineTo(x2 + canvas.width / 2 + cupWidth, y2 + cupHeight + canvas.height / 2);
    ctx.lineTo(x2 + canvas.width / 2 + cupWidth, y2 + canvas.height / 2);
    ctx.stroke();
}

// Draw function
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < cupStates.length; i++) {
        let animState = cupAnimationStates[i];
        let offsetRatio = animState.progress / ANIMATION_FRAMES;
        let animOffset = -offsetRatio * ANIMATION_DIST;
        drawCup(
            cupStates[i].cont,
            cupStates[i].pos.x * 1.3,
            cupStates[i].pos.y * 1.3,
            1.3,
            i,
            animOffset
        );
    }

    // Advance all animations
    for (let i = 0; i < cupAnimationStates.length; i++) {
        let anim = cupAnimationStates[i];
        if (anim.direction !== 0) {
            anim.progress += anim.direction;
            if (anim.direction > 0 && anim.progress >= ANIMATION_FRAMES) {
                anim.progress = ANIMATION_FRAMES;
                anim.direction = 0;
            }
            if (anim.direction < 0 && anim.progress <= 0) {
                anim.progress = 0;
                anim.direction = 0;
            }
        }
    }

    requestAnimationFrame(draw);
}

// Call this to reset the game and redraw
function resetGame() {
    initializeGame();
    repositionCups();
}

// Setup function for game start
initializeGame();
repositionCups();
draw();

// -- Resizing
function resizeCanvas() {
    canvas.width = (window.innerWidth) - 25;
    canvas.height = (window.innerHeight) - 25;
    repositionCups();
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// -- Keyboard
window.addEventListener("keydown", (e) => {
    keysPressed[e.key.toLowerCase()] = true;
});
window.addEventListener("keyup", (e) => {
    keysPressed[e.key.toLowerCase()] = false;
});



// -- Mouse interaction for cup moving logic
canvas.addEventListener("mousedown", (e) => {
    mousedown = true;
    let rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left;
    let my = e.clientY - rect.top;

    // Find which cup was clicked
    let clickedIndex = -1;
    for (let i = cupStates.length - 1; i >= 0; i--) {
        let pos = cupStates[i].pos;
        // Check if this cup is unclickable (full and all same color)
        if (
            isPointInCup(mx, my, pos.x, pos.y, 1.3)
            && !isCupFullAndUniform(cupStates[i])
        ) {
            clickedIndex = i;
            break;
        }
    }

    if (clickedIndex === -1) return;

    // If nothing is currently selected, select and animate up
    if (selectedCupIndex === null) {
        selectedCupIndex = clickedIndex;
        if (!cupAnimationStates[clickedIndex].selected) {
            // Animate up
            cupAnimationStates[clickedIndex].direction = 1;
            cupAnimationStates[clickedIndex].target = ANIMATION_FRAMES;
            cupAnimationStates[clickedIndex].selected = true;
        } else {
            // Animate down if already selected (toggle off)
            cupAnimationStates[clickedIndex].direction = -1;
            cupAnimationStates[clickedIndex].target = 0;
            cupAnimationStates[clickedIndex].selected = false;
            selectedCupIndex = null;
        }
    } else if (selectedCupIndex === clickedIndex) {
        // Clicked same cup again: animate it down and deselect
        cupAnimationStates[clickedIndex].direction = -1;
        cupAnimationStates[clickedIndex].target = 0;
        cupAnimationStates[clickedIndex].selected = false;
        selectedCupIndex = null;
    } else {
        // Second cup clicked. Custom pour logic: pour as many matching colors as possible from fromCup to toCup.
        let fromIndex = selectedCupIndex;
        let toIndex = clickedIndex;
        let fromCup = cupStates[fromIndex];
        let toCup = cupStates[toIndex];
        // Don't allow pouring into an "unclickable" cup, either
        if (isCupFullAndUniform(toCup)) {
            // Animate both down and deselect
            cupAnimationStates[toIndex].direction = -1;
            cupAnimationStates[toIndex].target = 0;
            cupAnimationStates[toIndex].selected = false;
            cupAnimationStates[fromIndex].direction = -1;
            cupAnimationStates[fromIndex].target = 0;
            cupAnimationStates[fromIndex].selected = false;
            selectedCupIndex = null;
            return;
        }

        // Pour repeatedly: as long as top color matches and toCup isn't full, move the top color
        let movedAny = false;
        let maxToCupSize = 4;

        if (fromCup.cont.length > 0 && toCup.cont.length < maxToCupSize) {
            // Only start pouring if either toCup is empty, or top color matches
            let canStart = false;
            if (toCup.cont.length === 0) {
                canStart = true;
            } else {
                let fromTop = fromCup.cont[fromCup.cont.length - 1];
                let toTop = toCup.cont[toCup.cont.length - 1];
                if (fromTop === toTop) {
                    canStart = true;
                }
            }
            if (canStart) {
                // What color can we pour?
                let color = fromCup.cont[fromCup.cont.length - 1];
                while (
                    fromCup.cont.length > 0 &&
                    toCup.cont.length < maxToCupSize &&
                    fromCup.cont[fromCup.cont.length - 1] === color &&
                    (toCup.cont.length === 0 || toCup.cont[toCup.cont.length - 1] === color)
                ) {
                    toCup.cont.push(fromCup.cont.pop());
                    movedAny = true;
                }
            }
        }

        // Animate toCup and fromCup down and deselect
        cupAnimationStates[toIndex].direction = -1;
        cupAnimationStates[toIndex].target = 0;
        cupAnimationStates[toIndex].selected = false;

        cupAnimationStates[fromIndex].direction = -1;
        cupAnimationStates[fromIndex].target = 0;
        cupAnimationStates[fromIndex].selected = false;

        selectedCupIndex = null;

        // If nothing was poured, select the new cup and animate up (old behavior)
        if (!movedAny) {
            selectedCupIndex = toIndex;
            cupAnimationStates[toIndex].direction = 1;
            cupAnimationStates[toIndex].target = ANIMATION_FRAMES;
            cupAnimationStates[toIndex].selected = true;
        }
    }

    // --- WIN DETECTION (after every legal action) ---
    setTimeout(() => { // Timeout so visuals update first
        if (isGameWon()) {
            setTimeout(() => {
                alert("Congratulations! You won! The game will reset.");
                resetGame();
            }, 100);
            return;
        }
        // Lose condition
        if (!hasAvailableMoves()) {
            setTimeout(() => {
                alert("No available moves. You lost! The game will reset.");
                resetGame();
            }, 100);
        }
    }, 100);
});

canvas.addEventListener("mouseup", (e) => {
    mousedown = false;
});

canvas.addEventListener("mousemove", (e) => {
    let rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});
</script>
</html>
