<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Tetris</title>
    <link rel="icon" type="image/x-icon" href="icon.ico" />
    <style>
body {
    font-family: 'Courier New', Courier, monospace;
    background: #000;
    min-height: 100vh;
    margin: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

#topBar {
    position: fixed;
    left: calc(50% - 340px);
    top: calc(50% - 380px);
    width: 100vw;
    z-index: 1005;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 64px;
    background: rgba(0,0,0,0.85);
    box-sizing: border-box;
    box-shadow: 0 1px 10px #0009;
    margin-bottom: 0;
}

#mainArea {
    display: flex;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    width: 100vw;
    margin-top: 0;
    position: relative;
    box-sizing: border-box;
}

#column-flex {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    margin-left: 30px;
    margin-top: 45px;
    z-index: 2;
}

canvas {
    background: #000;
    border: 8px solid #fff;
    display: block;
}

#tetris {
    margin-left: 0;
    box-shadow: 0 0 30px #111;
    max-width: 100vw;
    max-height: 85vh;
    z-index: 1;
    position: relative;
}

.menuStyle {
    color: #fff;
    background: #000;
    border: 2px solid #d0d0d0;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    border-radius: 5px;
    margin: 6px;
    width: 120px;
    height: 48px;
    font-size: 17px;
    box-sizing: border-box;
    letter-spacing: 1px;
    transition: background 0.2s, color 0.2s;
}

#score,
#level,
#highscoreDisplay {
    height: 42px;
    min-width: 90px;
    font-weight: bold;
    font-size: 1rem;
    margin-right: 8px;
    background: #111;
    border-radius: 5px;
}

#topDisplay {
    display: flex;
    flex: 1;
    justify-content: flex-start;
    align-items: center;
    margin-left: 15px;
    margin-bottom: 0;
    transform: scale(1.18);
}

#minimizeBtn {
    background: #444;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 3px 14px;
    font-size: 17px;
    cursor: pointer;
    margin-left: 20px;
    margin-right: 10px;
    margin-top: 2px;
    transition: background 0.15s;
}
#minimizeBtn:hover {
    background: #222;
}

#next {
    width: 200px;
    min-height: 140px;
    background: #fafafa;
    border: 6px solid #d0d0d0;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    margin-bottom: 35px;
    margin-top: 18px;
    margin-left: 0;
    border-radius: 25px;
    box-shadow: 0 2px 10px #bbb;
    transition: box-shadow 0.15s;
    z-index: 2;
}

#next-title {
    font-size: 24px;
    color: #005;
    margin: 16px 0 8px 0;
    font-weight: bold;
    display: block;
}

#next-canvas {
    width: 120px !important;
    height: 60px !important;
    max-width: 120px;
    max-height: 60px;
    margin: 0 auto 8px auto;
    border: none;
    transform: scale(1.0);
    background: transparent;
    display: block;
}

#settingsDropdownn {
    z-index: 10;
    position: relative;
    width: 100%;
    margin-bottom: 18px;
    display: flex;
    justify-content: center;
}
#settingsDropdown {
    border: 2px solid #d0d0d0;
    width: 160px;
    height: 44px;
    margin: 0 auto;
    font-size: 18px;
    background: #000;
    color: #fff;
    border-radius: 4px;
    text-align: center;
    appearance: none;
    cursor: pointer;
    z-index: 20;
}

#settingsDropdown option {
    color: #222;
    background: #fafafa;
}

#settingsDropdown:focus {
    outline: 2px solid #ff7600;
}

#howTo {
    position: relative;
    margin-top: 10px;
    font-size: 17px;
    font-weight: bold;
    background: #fafafa;
    border: 7px solid #d0d0d0;
    width: 200px;
    height: 140px;
    text-align: center;
    line-height: 19px;
    border-radius: 25px;
    z-index: 900;
    pointer-events: none;
    color: #111;
    box-shadow: 0 2px 8px #2222;
    padding-top: 14px;
}
#highscoreDisplay {
    width: 150px;
    font-size: 1rem;
    height: 42px;
    color: #ffd600;
    background: #232323;
    border-radius: 6px;
}

.score-level-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

@media (max-width: 800px) {
    body {
        display: block;
    }
    #mainArea {
        flex-direction: column;
        height: unset;
        margin-top: 64px;
        align-items: center;
    }
    #tetris, #topBar, #topDisplay {
        margin-left: 0 !important;
        margin-right: 0 !important;
        width: 90vw !important;
    }
    #column-flex {
        flex-direction: row;
        margin-top: 24px;
        margin-left: 0;
    }
    #next, #howTo {
        margin-top: 10px !important;
        position: static !important;
        right: unset;
    }
    #howTo {
        margin-left: 0 !important;
    }
}
    </style>
</head>
<body>
    <div id="topBar">
        <button id="minimizeBtn" title="Minimize">_</button>
        <div id="topDisplay" class="row-flex">
            <div id="score" class="menuStyle"></div>
            <div id="level" class="menuStyle"></div>
            <div id="highscoreDisplay" class="menuStyle"></div>
        </div>
    </div>
    <div id="mainArea">
        <canvas id="tetris" width="300" height="600"></canvas>
        <div id="column-flex">
            <div id="settingsDropdownn">
                <select id="settingsDropdown" class="menuStyle">
                  <option disabled selected value="">SETTINGS</option>
                  <option value="option1">Board Height</option>
                  <option id="botOption" value="bot">Auto Bot: OFF</option>
                </select>
            </div>
            <div id="next" class="menuStyle">
                <div id="next-title">Next Piece</div>
                <canvas id="next-canvas" width="120" height="60"></canvas>
            </div>
            <div id="howTo">
                <div>Controls:</div>
                <p>↑ to rotate shape</p>
                <p>← &amp; → to move</p>
                <p>↓ to drop shape</p>
            </div>
        </div>
    </div>

    <!-- (JS unchanged below) -->
    <script>
        // ===== Minimizer logic =====
        document.getElementById('minimizeBtn').addEventListener('click', function() {
          // Hide everything except the tetris canvas
          // Hide: topBar, mainArea's side divs, etc. Keep only #tetris canvas showing.
          document.getElementById('topBar').style.display = "none";
          // Hide everything in #mainArea except the canvas
          var main = document.getElementById('mainArea');
          for (let child of main.children) {
            if (child.tagName === "CANVAS" && child.id === "tetris") {
              child.style.display = "block";
            } else {
              child.style.display = "none";
            }
          }
        });

        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        ctx.scale(30, 30);
        const nextCanvas = document.getElementById('next-canvas');
        const nextCtx = nextCanvas.getContext('2d');
        nextCtx.scale(30, 30);
        let currentPieceId = 1;
        let ROWS = 20, COLUMNS = 10;
        const arena = Array.from({ length: ROWS }, () => Array(COLUMNS).fill(0));
        const colors = ['#00FFFF', '#FFFF00', '#00FFFF', '#00FF00', '#FF0000', '#3355FF', '#ff7600'];
        let score = 0;
        let linesCleared = 0;
        let level = 1;
        let currentHighscore = localStorage.getItem('highscore');
        if (currentHighscore == null) { currentHighscore = 0 }
        document.getElementById('highscoreDisplay').innerText = `Hi-Score: ${currentHighscore}`;

        const pieces = [
            { shape: [[1, 1, 1, 1,]]}, // I
            { shape: [[1, 1], [1, 1]] }, // O
            { shape: [[0, 1, 0], [1, 1, 1]] }, // T
            { shape: [[1, 1, 0], [0, 1, 1]] }, // S
            { shape: [[0, 1, 1], [1, 1, 0]] }, // Z
            { shape: [[1, 0, 0], [1, 1, 1]] }, // L
            { shape: [[0, 0, 1], [1, 1, 1]] }  // J
        ];

        function collide(arena, player) {
            return player.shape.some((row, y) =>
                row.some((value, x) => {
                    if (!value) return false;
                    const nx = x + player.x;
                    const ny = y + player.y;
                    if (nx < 0 || nx >= COLUMNS || ny >= arena.length) return true;
                    if (ny < 0) return false;
                    return arena[ny][nx] !== 0;
                })
            );
        }

        function gridFromArena(arena) {
            return arena.map(row => row.map(cell => cell ? 1 : 0));
        }

        function collideGrid(grid, piece) {
            return piece.shape.some((row, y) =>
                row.some((value, x) => {
                    if (!value) return false;
                    const nx = x + piece.x;
                    const ny = y + piece.y;
                    if (nx < 0 || nx >= COLUMNS || ny >= grid.length) return true;
                    if (ny < 0) return false;
                    return grid[ny][nx] !== 0;
                })
            );
        }

        function countFilled(grid) {
            return grid.reduce((n, row) => n + row.reduce((m, c) => m + (c ? 1 : 0), 0), 0);
        }

        function getHeights(grid) {
            const heights = Array(COLUMNS).fill(0);
            for (let x = 0; x < COLUMNS; x++) {
                for (let y = 0; y < grid.length; y++) {
                    if (grid[y][x]) {
                        heights[x] = grid.length - y;
                        break;
                    }
                }
            }
            return heights;
        }

        function wellDepthSum(grid) {
            const heights = getHeights(grid);
            let sum = 0;
            for (let x = 0; x < COLUMNS; x++) {
                const left = x > 0 ? heights[x - 1] : heights[x];
                const right = x < COLUMNS - 1 ? heights[x + 1] : heights[x];
                const pit = Math.min(left, right) - heights[x];
                if (pit > 0) sum += pit * pit;
            }
            return sum;
        }

        function isFillableCavity(grid, x, y) {
            if (grid[y][x]) return false;
            for (let yy = 0; yy < y; yy++) {
                if (grid[yy][x]) return true;
            }
            const heights = getHeights(grid);
            const left = x > 0 ? heights[x - 1] : heights[x];
            const right = x < COLUMNS - 1 ? heights[x + 1] : heights[x];
            const wall = Math.min(left, right);
            if (heights[x] >= wall) return false;
            return y >= grid.length - wall;
        }

        function countCavityCellsFilled(beforeGrid, shape, placeX, placeY) {
            let filled = 0;
            for (let py = 0; py < shape.length; py++) {
                for (let px = 0; px < shape[py].length; px++) {
                    if (!shape[py][px]) continue;
                    const cx = placeX + px;
                    const cy = placeY + py;
                    if (cx < 0 || cx >= COLUMNS || cy < 0 || cy >= beforeGrid.length) continue;
                    if (isFillableCavity(beforeGrid, cx, cy)) filled++;
                }
            }
            return filled;
        }

        function getTwoWideGaps(grid) {
            const heights = getHeights(grid);
            const gaps = [];
            for (let x = 0; x < COLUMNS - 1; x++) {
                const h1 = heights[x];
                const h2 = heights[x + 1];
                const wallLeft = x > 0 ? heights[x - 1] : h1;
                const wallRight = x + 2 < COLUMNS ? heights[x + 2] : h2;
                const wall = Math.min(wallLeft, wallRight);
                const depth = wall - Math.max(h1, h2);
                if (depth >= 2 && h1 < wall && h2 < wall) {
                    gaps.push({
                        left: x,
                        right: x + 1,
                        wall,
                        shoulderY: grid.length - wall
                    });
                }
            }
            return gaps;
        }

        function isInTwoWideGap(grid, gap, x, y) {
            if (x < gap.left || x > gap.right || grid[y][x]) return false;
            if (y < gap.shoulderY) return false;
            return true;
        }

        function scoreTwoWideGapFill(beforeGrid, shape, placeX, placeY, pieceIndex) {
            const gaps = getTwoWideGaps(beforeGrid);
            if (!gaps.length) return 0;
            const isLJ = pieceIndex === 5 || pieceIndex === 6;
            let best = 0;

            for (const gap of gaps) {
                let inGap = 0;
                const cols = new Set();
                for (let py = 0; py < shape.length; py++) {
                    for (let px = 0; px < shape[py].length; px++) {
                        if (!shape[py][px]) continue;
                        const cx = placeX + px;
                        const cy = placeY + py;
                        if (cx < gap.left || cx > gap.right) continue;
                        if (!isInTwoWideGap(beforeGrid, gap, cx, cy)) continue;
                        inGap++;
                        cols.add(cx);
                    }
                }
                if (cols.size < 2 || inGap === 0) continue;

                let gapScore = inGap * 15000;
                if (isLJ) {
                    gapScore += inGap * 35000;
                    if (inGap >= 3) gapScore += 80000;
                }
                best = Math.max(best, gapScore);
            }
            return best;
        }

        function simulatePlacement(grid, shape, x, pieceIndex) {
            const g = grid.map(r => r.slice());
            let y = 0;
            const test = { shape, x, y };
            if (collideGrid(g, test)) return null;
            while (!collideGrid(g, { shape, x, y: y + 1 })) y++;
            const holesBefore = countHoles(g);
            const wellsBefore = wellDepthSum(g);
            const cavityFilled = countCavityCellsFilled(g, shape, x, y);
            const twoWideGapFill = scoreTwoWideGapFill(g, shape, x, y, pieceIndex);
            let landingY = y;
            for (let py = 0; py < shape.length; py++) {
                for (let px = 0; px < shape[py].length; px++) {
                    if (shape[py][px]) {
                        g[y + py][x + px] = 1;
                        landingY = Math.max(landingY, y + py);
                    }
                }
            }
            let lines = 0;
            for (let row = g.length - 1; row >= 0; row--) {
                if (g[row].every(v => v)) {
                    g.splice(row, 1);
                    g.unshift(Array(COLUMNS).fill(0));
                    lines++;
                    row++;
                }
            }
            const holesAfter = countHoles(g);
            const wellsAfter = wellDepthSum(g);
            return {
                grid: g,
                lines,
                newHoles: holesAfter - holesBefore,
                holesReduced: holesBefore - holesAfter,
                wellsReduced: wellsBefore - wellsAfter,
                cavityFilled,
                twoWideGapFill,
                landingY,
                x
            };
        }

        function countHoles(grid) {
            let holes = 0;
            for (let x = 0; x < COLUMNS; x++) {
                let blocked = false;
                for (let y = 0; y < grid.length; y++) {
                    if (grid[y][x]) blocked = true;
                    else if (blocked) holes++;
                }
            }
            return holes;
        }

        function lineClearBonus(linesCleared) {
            if (linesCleared <= 0) return 0;
            if (linesCleared === 1) return 6000;
            if (linesCleared === 2) return 22000;
            if (linesCleared === 3) return 50000;
            return 120000;
        }

        function scoreGrid(grid, result, filledBefore, preferFill) {
            const { lines, newHoles, holesReduced, wellsReduced, cavityFilled, twoWideGapFill, landingY, x } = result;
            const heights = getHeights(grid);
            const aggHeight = heights.reduce((a, b) => a + b, 0);
            const maxHeight = Math.max(...heights);
            let bumpiness = 0;
            for (let i = 0; i < heights.length - 1; i++) {
                bumpiness += Math.abs(heights[i] - heights[i + 1]);
            }

            let score = lineClearBonus(lines);

            if (newHoles > 0) {
                score -= newHoles * 100000;
            } else if (newHoles < 0) {
                score += (-newHoles) * 30000;
            }

            if (preferFill) {
                score += holesReduced * 35000;
                score += wellsReduced * 40000;
                score += cavityFilled * 25000;
                score += twoWideGapFill;
            } else {
                score += holesReduced * 12000;
                score += wellsReduced * 15000;
                score += cavityFilled * 8000;
                score += twoWideGapFill * 0.5;
            }

            score += landingY * 1400;
            score -= maxHeight * 3200;
            score -= aggHeight * 35;
            score -= bumpiness * 6;
            const minColHeight = Math.min(...heights);
            score -= (maxHeight - minColHeight) * 1200;

            const earlyGame = filledBefore < 28;
            if (earlyGame) {
                const center = (COLUMNS - 1) / 2;
                score -= Math.abs(x - center) * 800;
                score -= bumpiness * 25;
                score += landingY * 900;
                score -= maxHeight * 2000;
            }

            return score;
        }

        const LOOKAHEAD_WEIGHT = 0.58;

        function iPieceWellBonus(grid) {
            const heights = getHeights(grid);
            let bonus = 0;
            for (let x = 0; x < COLUMNS; x++) {
                const left = x > 0 ? heights[x - 1] : heights[x];
                const right = x < COLUMNS - 1 ? heights[x + 1] : heights[x];
                const depth = Math.min(left, right) - heights[x];
                if (depth >= 4) bonus += depth * 10000;
                else if (depth >= 2) bonus += depth * 3000;
            }
            return bonus;
        }

        function nextPieceSetupBonus(grid, nextPieceIndex) {
            if (nextPieceIndex === 0) return iPieceWellBonus(grid);
            if (nextPieceIndex === 5 || nextPieceIndex === 6) {
                return getTwoWideGaps(grid).length > 0 ? 25000 : 0;
            }
            if (nextPieceIndex === 1) return -wellDepthSum(grid) * 80;
            return 0;
        }

        function buildCandidates(grid, pieceIndex, startShape) {
            const candidates = [];
            let shape = startShape.map(row => row.slice());
            for (let rot = 0; rot < 4; rot++) {
                for (let x = -2; x < COLUMNS; x++) {
                    const result = simulatePlacement(grid, shape, x, pieceIndex);
                    if (result) candidates.push({ rotations: rot, x, result });
                }
                shape = rotate(shape);
            }
            return candidates;
        }

        function selectCandidatePool(candidates, pieceIndex, grid) {
            let pool = candidates;
            const isLJ = pieceIndex === 5 || pieceIndex === 6;
            if (isLJ && getTwoWideGaps(grid).length > 0) {
                const gapMoves = pool.filter(c => c.result.twoWideGapFill > 0);
                if (gapMoves.length) pool = gapMoves;
            }
            let preferFill = true;
            const safe = pool.filter(c => c.result.newHoles <= 0);
            if (safe.length) {
                pool = safe;
            } else {
                const minNew = Math.min(...pool.map(c => c.result.newHoles));
                pool = pool.filter(c => c.result.newHoles === minNew);
                preferFill = false;
            }
            return { pool, preferFill };
        }

        function getBestNextPieceScore(grid, nextPieceIndex, nextShape) {
            const candidates = buildCandidates(grid, nextPieceIndex, nextShape);
            if (!candidates.length) return -600000;

            const { pool, preferFill } = selectCandidatePool(candidates, nextPieceIndex, grid);
            const filled = countFilled(grid);
            let best = -Infinity;
            for (const move of pool) {
                const s = scoreGrid(move.result.grid, move.result, filled, preferFill);
                if (s > best) best = s;
            }
            return best;
        }

        function scoreMoveWithLookahead(move, filledBefore, preferFill, nextPieceIndex, nextShape) {
            let s = scoreGrid(move.result.grid, move.result, filledBefore, preferFill);
            const nextOutlook = getBestNextPieceScore(move.result.grid, nextPieceIndex, nextShape);
            s += nextOutlook * LOOKAHEAD_WEIGHT;
            s += nextPieceSetupBonus(move.result.grid, nextPieceIndex) * 0.45;
            if (nextOutlook <= -600000) s -= 200000;
            return s;
        }

        function computeBestMove() {
            const grid = gridFromArena(arena);
            const filledBefore = countFilled(grid);
            const pieceIndex = player.pieceIndex ?? -1;
            const nextPieceIndex = nextPlayer.pieceIndex ?? -1;
            const nextShape = nextPlayer.shape.map(row => row.slice());

            const candidates = buildCandidates(grid, pieceIndex, player.shape);
            if (!candidates.length) return null;

            const { pool, preferFill } = selectCandidatePool(candidates, pieceIndex, grid);

            let best = null;
            let bestScore = -Infinity;
            for (const move of pool) {
                const s = scoreMoveWithLookahead(move, filledBefore, preferFill, nextPieceIndex, nextShape);
                if (s > bestScore) {
                    bestScore = s;
                    best = { rotations: move.rotations, x: move.x };
                }
            }
            return finalizeBotPlan(best);
        }

        function finalizeBotPlan(move) {
            if (!move) return null;
            let shape = player.shape.map(row => row.slice());
            for (let r = 0; r < move.rotations; r++) shape = rotate(shape);
            let x = move.x;
            let y = 0;
            if (!collide(arena, { shape, x, y })) {
                while (!collide(arena, { shape, x, y: y + 1 })) y++;
            }
            return { rotations: move.rotations, x: move.x, y, shape };
        }

        function lockPiece() {
            merge(arena, player);
            clearLines();
            player = nextPlayer;
            nextPlayer = createPiece();
            botPlan = null;
            if (collide(arena, player)) {
                currentHighscore = localStorage.getItem('highscore');
                if (currentHighscore < score) {
                    localStorage.setItem('highscore', score);
                    document.getElementById('highscoreDisplay').innerText = `Hi-Score: ${score}`;
                }
                alert(`Game Over! Final Score: ${score}`);
                arena.forEach(row => row.fill(0));
                score = 0;
                linesCleared = 0;
                level = 1;
            }
        }

        function hardDrop() {
            player.y++;
            score++;
            if (collide(arena, player)) {
                player.y--;
                lockPiece();
            }
        }

        function updateBotOptionLabel() {
            const opt = document.getElementById('botOption');
            if (opt) opt.textContent = botEnabled ? 'Auto Bot: ON' : 'Auto Bot: OFF';
        }

        function runBotStep() {
            if (!botPlan) botPlan = computeBestMove();
            if (!botPlan) {
                hardDrop();
                return;
            }

            if (botPlan.rotations > 0) {
                const rotated = rotate(player.shape);
                if (!collide(arena, { ...player, shape: rotated })) {
                    player.shape = rotated;
                }
                botPlan.rotations--;
                return;
            }

            if (player.x < botPlan.x) {
                player.x++;
                if (collide(arena, player)) player.x--;
                return;
            }
            if (player.x > botPlan.x) {
                player.x--;
                if (collide(arena, player)) player.x++;
                return;
            }

            hardDrop();
        }
        
       function merge(arena, player) {
    for (let y = 0; y < player.shape.length; y++) {
        for (let x = 0; x < player.shape[y].length; x++) {
            if (player.shape[y][x]) {
                arena[y + player.y][x + player.x] = {
                    colorIdx: colors.indexOf(player.color) + 1,
                    pieceId: currentPieceId
                };
            }
        }
    }
    currentPieceId++;
}
        
        function rotate(matrix) {
            return matrix[0].map((_, i) => matrix.map(row => row[i])).reverse();
        }
        
        function clearLines() {
    let lines = 0;
    for (let y = arena.length - 1; y >= 0; y--) {
        if (arena[y].every(value => value !== 0)) {
            arena.splice(y, 1);
            arena.unshift(Array(COLUMNS).fill(0));
            lines++;
            linesCleared++;
            y++;
            const scoreTable = [0, 40, 100, 300, 1200];
            score += scoreTable[lines] * (level);

            if (linesCleared >= (level) * 10) {
                level++;
        }
    }
}}

      

        function updateBoard() {
            document.getElementById('score').innerText = `Pts: ${score} `;
            document.getElementById('level').innerText = `LvL: ${level}`;
            adjustFontSize(score);
        }

        function adjustFontSize(score) {
            const scoreElement = document.getElementById('score');
            if (score < 100) {
                scoreElement.style.fontSize = '20px';
            } else if (score < 1000) {
                scoreElement.style.fontSize = '15px';
            } else if (score < 10000) {
                scoreElement.style.fontSize = '10px';
            } else {
                scoreElement.style.fontSize = '7px';
            }
        }

        function createPiece() {
            const pieceIndex = Math.floor(Math.random() * pieces.length);
            const piece = pieces[pieceIndex];
            return {
                shape: piece.shape,
                pieceIndex,
                color: colors[Math.floor(Math.random() * colors.length)],
                x: Math.floor(COLUMNS / 2) - Math.floor(piece.shape[0].length / 2),
                y: 0
            };
        }

        let player = createPiece();
        let nextPlayer = createPiece();
        let dropCounter = 0, lastTime = 0;
        let dropInterval = 1000;

        let botEnabled = false;
        let botPlan = null;
        let botActionTimer = 0;
        const BOT_ACTION_DELAY = 45;

        function updateNext() {
            nextCtx.fillStyle = "#fafafa"
            nextCtx.clearRect(-5, -5, nextCanvas.width + 5, nextCanvas.height + 5);
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            nextPlayer.shape.forEach((row, y) => row.forEach((value, x) => {
                if (value) {
                    nextCtx.fillStyle = nextPlayer.color;
                    nextCtx.fillRect(x, y, 1, 1);
                    nextCtx.strokeStyle = '#222';
                    nextCtx.lineWidth = 0.05;
                    nextCtx.strokeRect(x, y, 1, 1);
                }
            }));
        }

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            updateBoard();
            updateNext();
            
            dropInterval = Math.max(1000 - level * 100, 100);

            if (botEnabled) {
                if (!botPlan) botPlan = computeBestMove();
                botActionTimer += deltaTime;
                while (botActionTimer >= BOT_ACTION_DELAY) {
                    botActionTimer -= BOT_ACTION_DELAY;
                    runBotStep();
                }
            } else {
                botPlan = null;
            }

            if (!botEnabled && dropCounter > dropInterval) {
                player.y++;
                if (collide(arena, player)) {
                    player.y--;
                    lockPiece();
                }
                dropCounter = 0;
            } else if (botEnabled) {
                dropCounter = 0;
            }
            
            draw();
            requestAnimationFrame(update);
        }
  
  function drawPieceBorder(shape, offsetX, offsetY, color='#fff') {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 0.13;
    for (let y = 0; y < shape.length; y++) {
        for (let x = 0; x < shape[y].length; x++) {
            if (!shape[y][x]) continue;
            const tx = offsetX + x;
            const ty = offsetY + y;
            if (y === 0 || !shape[y - 1][x])
                drawLine(tx, ty, tx + 1, ty);
            if (y === shape.length - 1 || !shape[y + 1][x])
                drawLine(tx, ty + 1, tx + 1, ty + 1);
            if (x === 0 || !shape[y][x - 1])
                drawLine(tx, ty, tx, ty + 1);
            if (x === shape[y].length - 1 || !shape[y][x + 1])
                drawLine(tx + 1, ty, tx + 1, ty + 1);
        }
    }
    ctx.restore();

    function drawLine(x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
    }
}
        function draw() {
          ctx.setTransform(1, 0, 0, 1, 0, 0);
ctx.scale(canvas.height / ROWS, canvas.height / ROWS);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

for (let y = 0; y < arena.length; y++) {
    for (let x = 0; x < arena[y].length; x++) {
        let cell = arena[y][x];
        ctx.fillStyle = cell ? colors[cell.colorIdx - 1] : '#000';
        ctx.fillRect(x, y, 1, 1);

        if (!cell) {
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 0.05;
            ctx.strokeRect(x, y, 1, 1);
        }
    }
}

    if (botEnabled && botPlan) {
        ctx.globalAlpha = 0.28;
        botPlan.shape.forEach((row, py) => row.forEach((value, px) => {
            if (value) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(botPlan.x + px, botPlan.y + py, 1, 1);
            }
        }));
        ctx.globalAlpha = 1;
        drawPieceBorder(botPlan.shape, botPlan.x, botPlan.y, 'rgba(255,255,255,0.45)');
    }

    player.shape.forEach((row, py) => row.forEach((value, px) => {
        if (value) {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x + px, player.y + py, 1, 1);
        }
    }));

    drawPieceBorder(player.shape, player.x, player.y);

    for (let colorIdx = 1; colorIdx <= colors.length; colorIdx++) {
        let visited = Array.from({length: arena.length}, () => Array(arena[0].length).fill(false));
for (let y = 0; y < arena.length; y++) {
    for (let x = 0; x < arena[0].length; x++) {
        const cell = arena[y][x];
        if (cell && !visited[y][x]) {
            const {pieceId, colorIdx} = cell;
            let queue = [[y, x]];
            let shape = [];
            let minX = x, minY = y, maxX = x, maxY = y;
            while (queue.length) {
                let [cy, cx] = queue.pop();
                if (cy < 0 || cy >= arena.length || cx < 0 || cx >= arena[0].length) continue;
                let ccell = arena[cy][cx];
                if (!ccell || ccell.pieceId !== pieceId || visited[cy][cx]) continue;
                visited[cy][cx] = true;
                shape.push([cy, cx]);
                minX = Math.min(minX, cx); minY = Math.min(minY, cy);
                maxX = Math.max(maxX, cx); maxY = Math.max(maxY, cy);
                queue.push([cy + 1, cx], [cy - 1, cx], [cy, cx + 1], [cy, cx - 1]);
            }
            let h = maxY - minY + 1, w = maxX - minX + 1;
            let shapeGrid = Array.from({length: h}, () => Array(w).fill(0));
            for (const [sy, sx] of shape) shapeGrid[sy - minY][sx - minX] = 1;
            drawPieceBorder(shapeGrid, minX, minY);
        }
    }
}
    }
}
document.getElementById('settingsDropdown').addEventListener('change', function() {
  const value = this.value;
  handleSettingsOption(value);
  this.selectedIndex = 0;
});

        document.addEventListener('keydown', event => {
            if (botEnabled) return;
            if (event.key === 'ArrowLeft' || event.key === 'a') {
                player.x--;
                if (collide(arena, player)) player.x++;
            }
            if (event.key === 'ArrowRight' || event.key === 'd') {
                player.x++;
                if (collide(arena, player)) player.x--;
            }
            if (event.key === 'ArrowDown' || event.key === 's') {
                hardDrop();
            }
            if (event.key === 'ArrowUp' || event.key === 'w') {
                const rotated = rotate(player.shape);
                if (!collide(arena, { ...player, shape: rotated })) player.shape = rotated;
            }
        });
        
        update();
function handleSettingsOption(value) {
  if (value === 'option1') {
    let newHeight = parseInt(prompt("Enter new board height (e.g. 20):"), 10);
    if (!isNaN(newHeight) && newHeight > 0 && newHeight <= 100) {
      ROWS = newHeight;
      arena.length = 0;
      for (let i = 0; i < ROWS; i++) {
        arena.push(Array(COLUMNS).fill(0));
      }
      canvas.height = ROWS * 30;
      score = 0; linesCleared = 0; level = 1;
      player = createPiece();
      nextPlayer = createPiece();
      dropCounter = 0;
      lastTime = 0;
      botPlan = null;
      botActionTimer = 0;
      alert("Board height changed! Restarting...");
    } else {
      alert("Invalid height!");
    }
  } else if (value === 'bot') {
    botEnabled = !botEnabled;
    botPlan = null;
    botActionTimer = 0;
    updateBotOptionLabel();
  }
}
