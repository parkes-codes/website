<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parkes's clicker game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="icon.ico" />
</head>
<body>
    <style>
        body {
            background-color: #000010;
            font-family: "Courier  New",courier,monospace;
            color: #ffffff;
        }
        #cookie {
            cursor: pointer;
            position: relative;
            top: 25vh;
            transform-origin: center;
            width: 200px;
            height: 200px;
            font-size: 150px;
            background-color: #000000;
            border: #ddffff 10px solid;
            border-radius: 20px;
            color: #ffffff;
        }

        .container1 {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .container2 {
    position: fixed;        
    top: 0;                  
    right: 0;                 
    display: flex;
    flex-direction: column;
    align-items: flex-end;    
}

.upgrades {
    width: fit-content;
    white-space: nowrap;
}
#moneyDisplay {
    margin-bottom: -100px
}

#dbsDisplay {
    margin-top: 100px;
    margin-bottom: -30px;
}

    </style>
      <div class="container1">
        <h2 id="dbsDisplay">Dabloons per second: 0</h2>
        <h1 id="moneyDisplay">Dabloons: 0</h1>
        <button onclick="animateButton();" id="cookie">$</button>
      </div>
      <div class="container2">
            <div>Buy a Pirate (1 db/s)<button onclick="buyupgrade(1)" id="b1" class="upgrades">Cost 15 Dabloons</button></div>
            <div>Buy a Cannon (10 db/s)<button onclick="buyupgrade(2)" id="b2" class="upgrades">Cost 150 Dabloons</button></div>
            <div>Buy a Rowboat (75 db/s)<button onclick="buyupgrade(3)" id="b3" class="upgrades">Cost 1000 Dabloons</button></div>
      </div>
  <script>
    const cookie = document.getElementById("cookie");
    const moneyDisplay = document.getElementById("moneyDisplay");
    const dbsDisplay = document.getElementById("dbsDisplay");
    const clickSound = new Audio("click.wav");
    const body = document.body
    let dabloons = 0;
    let dbs = 0;
    const pi = Math.PI;

    let upgradesData = {
  1: { cost: 15, dbs: 1 },
  2: { cost: 150, dbs: 10 },
  3: { cost: 1000, dbs: 75 },
};
    let fps = 0;
    let lastTime = Date.now();

    function tick() {
      
      const now = Date.now();
      const delta = (now - lastTime) / 1000; // seconds since last frame
      lastTime = now;

      if (delta > 0) {
        fps = 1 / delta;
        dabloons += dbs * delta;
        moneyDisplay.textContent = `Dabloons: ${Math.floor(dabloons)}`;
      }

      requestAnimationFrame(tick);
    }
    tick();

    function animateButton(){
        clickSound.currentTime = 0;
        clickSound.play();
        cookie.style.transform = `rotate(${(Math.random()*20-10)}deg)`
        dabloons++;
        moneyDisplay.textContent = `Dabloons: ${dabloons}`;
    }

    function buyupgrade(id) {
        const upgrade = upgradesData[id];
        if (dabloons >= upgrade.cost) {
        dbs += upgrade.dbs;
        dabloons -= upgrade.cost;
        upgrade.cost = Math.ceil(upgrade.cost * 1.2);
        moneyDisplay.textContent = `Dabloons: ${Math.floor(dabloons)}`;
        dbsDisplay.textContent = `Dabloons per second ${dbs}`;
        document.getElementById(`b${id}`).textContent = `Cost ${upgrade.cost} Dabloons`;
        }

    }

  </script>
</body>
</html>
